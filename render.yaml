services:
  - type: web
    name: ecosort-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # you enter this manually in Render dashboard
      - key: FRONTEND_ORIGIN
        value: ""            # same-origin, not needed when Flask serves the HTML
      - key: FLASK_DEBUG
        value: "false"
      - key: FLASK_PORT
        value: "10000"       # Render assigns port via $PORT; app.py reads FLASK_PORT
